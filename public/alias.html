<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alias</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Join overlay -->
  <div id="join-overlay" class="overlay active">
    <div class="join-box">
      <h1 style="background: linear-gradient(135deg, #e67e22, #9b59b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Alias</h1>
      <input type="text" id="player-name" placeholder="Твоё имя" maxlength="20" autocomplete="off">
      <button id="btn-create" style="background:#e67e22;">Создать комнату</button>
      <div class="divider">или</div>
      <input type="text" id="room-code-input" placeholder="Код комнаты" maxlength="4" autocomplete="off">
      <button id="btn-join">Присоединиться</button>
      <div id="join-error" class="error"></div>
      <div class="game-switch">
        <a href="/">Играть в Codenames</a>
      </div>
    </div>
    <div class="version">v1.3.0</div>
  </div>

  <!-- Game screen -->
  <div id="game-screen" class="game-screen hidden">

    <div class="top-bar">
      <div class="top-left">
        <span class="room-label">Комната:</span>
        <span id="room-code" class="room-code"></span>
      </div>
      <div class="top-center">
        <div id="scores-bar" class="scores-bar"></div>
      </div>
      <div class="top-right">
        <div id="name-editor" class="name-editor">
          <input type="text" id="name-input" maxlength="20" autocomplete="off" placeholder="Имя">
          <button id="btn-change-name" title="Сменить имя">&#10003;</button>
        </div>
      </div>
    </div>

    <div class="info-bar">
      <div id="turn-indicator" class="turn-indicator"></div>
      <div id="timer-display" class="timer-display hidden"></div>
      <div class="action-buttons">
        <button id="btn-pause" class="btn-action host-only hidden" title="Пауза">&#9208; Пауза</button>
        <button id="btn-restart" class="btn-action host-only hidden" title="Рестарт">&#8635; Рестарт</button>
        <button id="btn-shuffle" class="btn-action host-only hidden" title="Перемешать">&#8645; Шафл</button>
        <div id="settings-wrap" class="settings-wrap host-only hidden">
          <button id="btn-settings" class="btn-action">&#9881; Настройки</button>
          <div id="settings-dropdown" class="settings-dropdown hidden">
            <label>Команды
              <select id="s-teams">
                <option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option>
              </select>
            </label>
            <label>Таймер (сек)
              <select id="s-timer">
                <option value="30">30</option><option value="45">45</option>
                <option value="60" selected>60</option><option value="90">90</option>
                <option value="120">120</option>
              </select>
            </label>
            <label>Цель (очки)
              <select id="s-target">
                <option value="15">15</option><option value="20">20</option>
                <option value="30" selected>30</option><option value="50">50</option>
                <option value="75">75</option><option value="100">100</option>
              </select>
            </label>
            <label>Сложность
              <select id="s-difficulty">
                <option value="normal">Нормальная</option>
                <option value="hard">Сложная</option>
              </select>
            </label>
            <button id="btn-apply-settings">Применить</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Alias game area -->
    <div id="alias-area" class="alias-center"></div>

    <!-- Player panel -->
    <div id="player-panel" class="player-panel"></div>

    <!-- Pause overlay -->
    <div id="pause-overlay" class="pause-overlay hidden">
      <div class="pause-content">
        <div class="pause-text">Пауза</div>
        <button id="btn-unpause" class="btn-unpause">&#9654; Продолжить</button>
      </div>
    </div>

    <!-- Winner overlay -->
    <div id="winner-overlay" class="winner-overlay hidden">
      <div id="winner-text" class="winner-text"></div>
      <button id="btn-new-game-win">Новая игра</button>
    </div>
  </div>

  <script src="alias.js"></script>
</body>
</html>
