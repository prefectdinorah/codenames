<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codenames & Alias</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Join overlay -->
  <div id="join-overlay" class="overlay active">
    <div class="join-box">
      <h1 id="join-title">Игры</h1>
      <input type="text" id="player-name" placeholder="Твоё имя" maxlength="20" autocomplete="off">
      <select id="mode-select" class="mode-select">
        <option value="codenames">Codenames</option>
        <option value="alias">Alias</option>
        <option value="spyfall">Один Шпион</option>
        <option value="crocodile">Крокодил</option>
      </select>
      <button id="btn-create">Создать комнату</button>
      <div class="divider">или</div>
      <input type="text" id="room-code-input" placeholder="Код комнаты" maxlength="4" autocomplete="off">
      <button id="btn-join">Присоединиться</button>
      <div id="join-error" class="error"></div>
    </div>
    <div class="version">v1.6.0</div>
  </div>

  <!-- Game screen -->
  <div id="game-screen" class="game-screen hidden">

    <div class="top-bar">
      <div class="top-left">
        <span class="room-label">Комната:</span>
        <span id="room-code" class="room-code"></span>
        <span id="game-mode-badge" class="game-mode-badge"></span>
        <button id="btn-leave" class="btn-leave" title="Выйти">&#10005;</button>
      </div>
      <div class="top-center">
        <div id="scores-bar" class="scores-bar"></div>
      </div>
      <div class="top-right">
        <div id="name-editor" class="name-editor">
          <input type="text" id="name-input" maxlength="20" autocomplete="off" placeholder="Имя">
          <button id="btn-change-name" title="Сменить имя">&#10003;</button>
        </div>
      </div>
    </div>

    <div class="info-bar">
      <div id="turn-indicator" class="turn-indicator"></div>
      <div id="timer-display" class="timer-display hidden"></div>
      <div id="clue-display" class="clue-display"></div>
      <div class="action-buttons">
        <button id="btn-pause" class="btn-action host-only hidden">&#9208; Пауза</button>
        <button id="btn-restart" class="btn-action host-only hidden">&#8635; Рестарт</button>
        <button id="btn-shuffle" class="btn-action host-only hidden">&#8645; Шафл</button>
        <div id="settings-wrap" class="settings-wrap host-only hidden">
          <button id="btn-settings" class="btn-action">&#9881; Настройки</button>
          <div id="settings-dropdown" class="settings-dropdown hidden">
            <!-- Codenames settings -->
            <div id="settings-codenames" class="hidden">
              <label>Команды <select id="s-teams"><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></label>
              <label>Строки <select id="s-rows"><option value="4">4</option><option value="5" selected>5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option></select></label>
              <label>Столбцы <select id="s-cols"><option value="4">4</option><option value="5" selected>5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option></select></label>
              <label>Таймер <select id="s-timer"><option value="0">Выкл</option><option value="30">30с</option><option value="60">60с</option><option value="90">90с</option><option value="120">120с</option><option value="180">180с</option></select></label>
            </div>
            <!-- Alias settings -->
            <div id="settings-alias" class="hidden">
              <label>Команды <select id="sa-teams"><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></label>
              <label>Таймер <select id="sa-timer"><option value="30">30с</option><option value="45">45с</option><option value="60" selected>60с</option><option value="90">90с</option><option value="120">120с</option></select></label>
              <label>Цель <select id="sa-target"><option value="15">15</option><option value="20">20</option><option value="30" selected>30</option><option value="50">50</option><option value="75">75</option><option value="100">100</option></select></label>
              <label>Сложность <select id="sa-difficulty"><option value="normal">Нормальная</option><option value="hard">Сложная</option></select></label>
            </div>
            <!-- Crocodile settings -->
            <div id="settings-crocodile" class="hidden">
              <label>Команды <select id="sc-teams"><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></label>
              <label>Таймер <select id="sc-timer"><option value="60">60с</option><option value="90" selected>90с</option><option value="120">120с</option><option value="180">180с</option></select></label>
              <label>Цель <select id="sc-target"><option value="5">5</option><option value="10">10</option><option value="15" selected>15</option><option value="20">20</option><option value="30">30</option></select></label>
              <label>Сложность <select id="sc-difficulty"><option value="normal">Нормальная</option><option value="hard">Сложная</option></select></label>
            </div>
            <!-- Spyfall settings -->
            <div id="settings-spyfall" class="hidden">
              <label>Раунд <select id="ss-duration">
                <option value="240">4 мин</option><option value="360">6 мин</option>
                <option value="480" selected>8 мин</option><option value="600">10 мин</option>
              </select></label>
            </div>
            <button id="btn-apply-settings">Применить</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Codenames area -->
    <div id="codenames-area" class="game-body hidden">
      <div id="clue-history-left" class="clue-sidebar"></div>
      <div class="board-area">
        <div id="board" class="board"></div>
        <div id="clue-form" class="clue-form hidden">
          <input type="text" id="clue-word" placeholder="Подсказка" maxlength="30" autocomplete="off">
          <input type="number" id="clue-count" placeholder="0" min="0" max="25" value="">
          <button id="btn-give-clue">Дать подсказку</button>
        </div>
        <button id="btn-end-turn" class="btn-end-turn hidden">Завершить ход</button>
      </div>
      <div id="clue-history-right" class="clue-sidebar"></div>
    </div>

    <!-- Alias area -->
    <div id="alias-area" class="alias-center hidden"></div>

    <!-- Spyfall area -->
    <div id="spyfall-area" class="spyfall-center hidden"></div>

    <!-- Crocodile area -->
    <div id="crocodile-area" class="croc-center hidden"></div>

    <!-- Player panel -->
    <div id="player-panel" class="player-panel"></div>

    <!-- Pause overlay -->
    <div id="pause-overlay" class="pause-overlay hidden">
      <div class="pause-content">
        <div class="pause-text">Пауза</div>
        <button id="btn-unpause" class="btn-unpause">&#9654; Продолжить</button>
      </div>
    </div>

    <!-- Winner overlay -->
    <div id="winner-overlay" class="winner-overlay hidden">
      <div id="winner-text" class="winner-text"></div>
      <button id="btn-new-game-win">Новая игра</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
