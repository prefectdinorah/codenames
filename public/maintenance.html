<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Технические работы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: #ebe4d4;
      color: #2a2418;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    .box {
      max-width: 520px;
      text-align: center;
    }
    .badge {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8a7f65;
      margin-bottom: 14px;
    }
    h1 {
      font-family: "Instrument Serif", "Times New Roman", serif;
      font-weight: 400;
      font-size: 56px;
      letter-spacing: -1.5px;
      line-height: 1;
      margin: 0 0 18px;
    }
    p {
      font-size: 13px;
      line-height: 1.55;
      color: #4a4030;
      margin: 0 0 8px;
    }
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c95a2e;
      margin-right: 8px;
      animation: pulse 1.6s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
    .footer {
      margin-top: 28px;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #8a7f65;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="badge"><span class="dot"></span>статус — обслуживание</div>
    <h1>Сайт временно недоступен.</h1>
    <p>Или не временно. Или не сайт.</p>
    <div class="footer">gddn · games</div>
  </div>
</body>
</html>
